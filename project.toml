# project.toml
# Google Cloud Buildpacks configuration for Cloud Run source deploys.
# Pinning runtime and entrypoint keeps Cloud Build Trigger behavior reproducible.

[[build.env]]
name = "GOOGLE_RUNTIME_VERSION"
value = "3.12"

[[build.env]]
name = "GOOGLE_ENTRYPOINT"
value = "uvicorn server:app --host 0.0.0.0 --port $PORT"
