# .github/workflows/ci.yml
# Continuous integration and main-branch Cloud Run deployment for the server.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -t limbus-translation-server .

  emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Python
        run: uv python install 3.12
      - name: Start compose stack
        run: docker compose -f docker-compose.yml -f docker-compose.emulator.yml up --build -d
      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8000/ && exit 0
            sleep 2
          done
          docker compose -f docker-compose.yml -f docker-compose.emulator.yml logs
          exit 1
      - name: Run emulator integration tests
        env:
          API_KEY: change-me
          GOOGLE_CLOUD_PROJECT: limbus-local
          FIRESTORE_DATABASE: "(default)"
          FIRESTORE_EMULATOR_HOST: localhost:8080
        run: |
          uv sync --locked
          uv run pytest tests/test_firestore_emulator.py
      - name: Stop compose stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.emulator.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker, emulator]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Artifact Registry Docker auth
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
      - name: Build server image
        run: docker build -t "${IMAGE_URI}" .
        env:
          IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/limbus-translation-server:${{ github.sha }}
      - name: Push server image
        run: docker push "${IMAGE_URI}"
        env:
          IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/limbus-translation-server:${{ github.sha }}
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/limbus-translation-server:${{ github.sha }}
          env_vars: |-
            API_KEY=${{ secrets.API_KEY }}
            GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }}
            FIRESTORE_DATABASE=${{ vars.FIRESTORE_DATABASE }}
            CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
      - name: Show deployed URL
        run: echo "${{ steps.deploy.outputs.url }}"
