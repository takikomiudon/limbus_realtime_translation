# project.toml
# Google Cloud Buildpacks config when Cloud Build uses server/ as source root.

schema-version = "0.2"

[[io.buildpacks.build.env]]
name = "GOOGLE_PYTHON_VERSION"
value = "3.12"

[[io.buildpacks.build.env]]
name = "GOOGLE_ENTRYPOINT"
value = "uvicorn server:app --host 0.0.0.0 --port $PORT"
